services:
  custom-linux-db:
    image: mysql:8.0
    container_name: linux-mysql-sandbox
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sandbox_db
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - monitor-net

  alpine-ingest-app:
    build: ./backend
    container_name: alpine-ingest-app
    restart: always
    ports:
      - "8081:8080"
    volumes:
      - ./data/ingest:/monitored/ingest:rw
      - ~/.ssh/id_local_ssh:/root/.ssh/id_local_ssh:ro
      - ./backend/scripts/launch-replica.sh:/app/scripts/launch-replica.sh:ro
      - ./logs:/app/logs
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://custom-linux-db:3306/sandbox_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root_password
      - REPLICA_ONE_URL=http://alpine-replica-1:8080
      - REPLICA_TWO_URL=http://alpine-replica-2:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      custom-linux-db:
        condition: service_healthy
    networks:
      - monitor-net

  alpine-replica-1:
    build: ./backend
    container_name: alpine-replica-1
    restart: always
    ports:
      - "8082:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://custom-linux-db:3306/sandbox_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root_password
      - STORAGE_PATH=/monitored/replica1
    volumes:
      - ./data/replica1:/monitored/replica1:rw
    depends_on:
      custom-linux-db:
        condition: service_healthy
    networks:
      - monitor-net

  alpine-replica-2:
    build: ./backend
    container_name: alpine-replica-2
    restart: always
    ports:
      - "8083:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://custom-linux-db:3306/sandbox_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root_password
      - STORAGE_PATH=/monitored/replica2
    volumes:
      - ./data/replica2:/monitored/replica2:rw
    depends_on:
      custom-linux-db:
        condition: service_healthy
    networks:
      - monitor-net

volumes:
  db_data:

networks:
  monitor-net:
    driver: bridge