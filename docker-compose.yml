services:
  custom-linux-db:
    build: ./database
    container_name: linux-mysql-sandbox
    restart: always
    ports:
      - "3307:3306"
    volumes:
      - ./data/ingest:/monitored/ingest
      - mysql_custom_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -proot || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - monitor-net

  alpine-ingest-app:
    build: ./backend
    container_name: alpine-ingest-app
    restart: always
    ports:
      - "8081:8080"
    volumes:
      - ./data/ingest:/monitored/ingest:rw
      - /var/run/docker.sock:/var/run/docker.sock # <-- Añadido aquí para darle superpoderes de Docker
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://custom-linux-db:3306/sandbox_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root_password
      # Le pasamos las dos rutas de réplica por entorno al nodo de ingesta
      - REPLICA_ONE_URL=http://alpine-replica-1:8080
      - REPLICA_TWO_URL=http://alpine-replica-2:8080
    depends_on:
      custom-linux-db:
        condition: service_healthy
    networks:
      - monitor-net

  # RÉPLICA A
  alpine-replica-1:
    build: ./backend
    container_name: alpine-replica-1
    restart: always
    ports:
      - "8082:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://custom-linux-db:3306/sandbox_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root_password
      - STORAGE_PATH=/monitored/replica1
    volumes:
      - ./data/replica1:/monitored/replica1:rw
    depends_on:
      custom-linux-db:
        condition: service_healthy
    networks:
      - monitor-net

  # RÉPLICA B (El nuevo nodo de respaldo espejo)
  alpine-replica-2:
    build: ./backend
    container_name: alpine-replica-2
    restart: always
    ports:
      - "8083:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://custom-linux-db:3306/sandbox_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root_password
      - STORAGE_PATH=/monitored/replica2
    volumes:
      - ./data/replica2:/monitored/replica2:rw
    depends_on:
      custom-linux-db:
        condition: service_healthy
    networks:
      - monitor-net

volumes:
  mysql_custom_data:

networks:
  monitor-net:
    driver: bridge